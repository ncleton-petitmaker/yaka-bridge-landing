services:
  landing:
    build: .
    image: yaka-bridge-landing:latest
    restart: unless-stopped
    environment:
      SITE_URL: ${SITE_URL:-https://yaka-bridge.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BOOKING_EMAIL_FROM: ${BOOKING_EMAIL_FROM:-Yaka-Bridge <noreply@yaka-bridge.com>}
      BOOKING_NOTIFICATION_EMAIL: ${BOOKING_NOTIFICATION_EMAIL:-nicolas.cleton@yaka-performance.com}
      BOOKING_DURATION_MINUTES: ${BOOKING_DURATION_MINUTES:-30}
      BOOKING_PREVIEW_SLOTS: ${BOOKING_PREVIEW_SLOTS:-false}
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.middlewares.yaka-bridge-redirect-https.redirectscheme.scheme=https
      - traefik.http.middlewares.yaka-bridge-redirect-https.redirectscheme.permanent=true
      - "traefik.http.routers.yaka-bridge-landing-http.rule=Host(`yaka-bridge.com`) || Host(`www.yaka-bridge.com`)"
      - traefik.http.routers.yaka-bridge-landing-http.entrypoints=http
      - traefik.http.routers.yaka-bridge-landing-http.middlewares=yaka-bridge-redirect-https
      - "traefik.http.routers.yaka-bridge-landing.rule=Host(`yaka-bridge.com`) || Host(`www.yaka-bridge.com`)"
      - traefik.http.routers.yaka-bridge-landing.entrypoints=https
      - traefik.http.routers.yaka-bridge-landing.tls=true
      - traefik.http.routers.yaka-bridge-landing.tls.certresolver=letsencrypt
      - traefik.http.services.yaka-bridge-landing.loadbalancer.server.port=80

networks:
  coolify:
    external: true
